name: build-images

# Builds container images for all 6 service/infra targets and pushes them.
#
# Push targets:
#   1. GHCR — always. Free, public-friendly, no extra config required;
#      authenticates with the workflow's GITHUB_TOKEN.
#   2. Tencent TCR — OPTIONAL mirror. Enable by setting in repo Settings
#      → Secrets and variables → Actions:
#         vars.TCR_NAMESPACE      e.g. baymaxleee
#         vars.TCR_HOST           (optional, default ccr.ccs.tencentyun.com)
#         secrets.TCR_USERNAME    Tencent Cloud account ID (digits)
#         secrets.TCR_PASSWORD    TCR access credential
#      The VPS then pulls from intra-Tencent-Cloud (~MB/s) instead of the
#      30-minute trans-Pacific haul through GHCR. Set IMAGE_REGISTRY in the
#      VPS's .env to the TCR path to actually consume the mirror.
#
# Tag strategy (applied to every registry the build pushes to):
#   - every commit on main → :sha-<short>   (immutable, deployable)
#   - every commit on main → :main          (mutable, "current main")
#   - every tag v*.*.*     → :<tag>         (immutable, release)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - 'infra/single-vps/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom tag to push (overrides default tag strategy)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        # gateway / iam / admin / chat / telemetry → backend service images
        # web                                      → nginx + bundled frontend SPA dist
        # db-init                                  → one-shot MySQL schema bootstrap
        service: [gateway, iam, admin, chat, telemetry, web, db-init]
    env:
      # Surfaced into the shell of every step so the "Compute tags" script
      # can branch on whether the TCR mirror is configured.
      TCR_HOST: ${{ vars.TCR_HOST || 'ccr.ccs.tencentyun.com' }}
      TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Tencent TCR (only when TCR_NAMESPACE is configured)
        if: vars.TCR_NAMESPACE != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.TCR_HOST || 'ccr.ccs.tencentyun.com' }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Compute tags
        id: tags
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${REPO_LC}/${{ matrix.service }}"
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-8)

          # Pick the immutable VER tag (always set) and an optional MOVABLE
          # tag (skipped for manual dispatch where the user gave their own).
          if [ -n "${{ inputs.tag }}" ]; then
            VER="${{ inputs.tag }}"
            MOVABLE=""
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
            MOVABLE="sha-${SHA_SHORT}"
          else
            VER="sha-${SHA_SHORT}"
            MOVABLE="main"
          fi

          # Comma-separated tag list; buildx pushes to all in a single upload.
          TAGS="${GHCR_IMAGE}:${VER}"
          [ -n "${MOVABLE}" ] && TAGS="${TAGS},${GHCR_IMAGE}:${MOVABLE}"

          if [ -n "${TCR_NAMESPACE}" ]; then
            TCR_IMAGE="${TCR_HOST}/${TCR_NAMESPACE}/${{ matrix.service }}"
            TAGS="${TAGS},${TCR_IMAGE}:${VER}"
            [ -n "${MOVABLE}" ] && TAGS="${TAGS},${TCR_IMAGE}:${MOVABLE}"
            echo "→ mirroring to TCR: ${TCR_IMAGE}"
          else
            echo "→ TCR mirror disabled (set vars.TCR_NAMESPACE to enable)"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      # Each Dockerfile expects a specific build context. We pick it per service.
      - name: Build context per service
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            gateway|iam)
              # Go services' Dockerfile COPYs from the service directory only.
              echo "context=apps/backend/services/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
              echo "dockerfile=apps/backend/services/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            admin|chat|telemetry)
              # Python services need apps/backend/{pyproject,services/<svc>,libs}.
              echo "context=apps/backend" >> "$GITHUB_OUTPUT"
              echo "dockerfile=apps/backend/services/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            web|db-init)
              # Single-VPS image; build context is the monorepo root so we can
              # COPY across frontend dist, backend migrations, and infra/.
              echo "context=." >> "$GITHUB_OUTPUT"
              echo "dockerfile=infra/single-vps/Dockerfile.${{ matrix.service }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
