name: build-images

# Builds container images for all 4 backend services and pushes them to a
# container registry.
#
# Default: pushes to GHCR (ghcr.io/<owner>/<repo>/<service>) — zero config
#          required, uses the workflow's GITHUB_TOKEN automatically.
#
# Switch to a private registry (e.g. 火山引擎 CR / Aliyun ACR / Harbor) by
# setting in repo Settings → Secrets and variables → Actions:
#   vars.IMAGE_REGISTRY        cr-cn-beijing.volces.com/<your-namespace>
#   secrets.REGISTRY_USERNAME  <robot account>
#   secrets.REGISTRY_PASSWORD  <robot password>
#
# Tag strategy:
#   - every commit on main → :sha-<short>   (immutable, deployable)
#   - every commit on main → :main          (mutable, "current main")
#   - every tag v*.*.*     → :<tag>         (immutable, release)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'apps/backend/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom tag to push (overrides default tag strategy)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required when pushing to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, iam, admin, telemetry]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve registry
        id: registry
        run: |
          # Custom registry wins; otherwise default to GHCR under this repo.
          if [ -n "${{ vars.IMAGE_REGISTRY }}" ]; then
            REG="${{ vars.IMAGE_REGISTRY }}"
            echo "is_ghcr=false" >> "$GITHUB_OUTPUT"
          else
            REG="ghcr.io/${{ github.repository }}"
            echo "is_ghcr=true" >> "$GITHUB_OUTPUT"
          fi
          echo "registry=${REG,,}" >> "$GITHUB_OUTPUT"
          echo "→ using registry: ${REG,,}"

      - uses: docker/setup-buildx-action@v3

      - name: Login (GHCR — uses GITHUB_TOKEN)
        if: steps.registry.outputs.is_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login (custom registry)
        if: steps.registry.outputs.is_ghcr == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute tags
        id: tags
        env:
          REGISTRY: ${{ steps.registry.outputs.registry }}
        run: |
          IMAGE="${REGISTRY}/${{ matrix.service }}"
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-8)
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${IMAGE}:${{ inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REL_TAG="${GITHUB_REF#refs/tags/}"
            TAGS="${IMAGE}:${REL_TAG},${IMAGE}:sha-${SHA_SHORT}"
          else
            TAGS="${IMAGE}:sha-${SHA_SHORT},${IMAGE}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      # Each service's Dockerfile expects build context = apps/backend/
      # (so it can COPY libs/ + the service dir together for the Python ones,
      # or the gateway one which uses its own subdir context). We pick the
      # right context per service.
      - name: Build context per service
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            gateway|iam)
              echo "context=apps/backend/services/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
              echo "dockerfile=apps/backend/services/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            admin|telemetry)
              echo "context=apps/backend" >> "$GITHUB_OUTPUT"
              echo "dockerfile=apps/backend/services/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
