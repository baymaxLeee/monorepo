name: backend

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'schemas/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy services libs
      # Demo phase: most services have no tests/ yet (see root AGENTS.md).
      # The guard skips services without a tests/ directory rather than
      # failing the build.
      - name: pytest (services with tests/)
        run: |
          for svc in services/*/; do
            if [ -d "$svc/tests" ]; then
              echo "==> pytest $svc"
              (cd "$svc" && uv run pytest -q)
            fi
          done

  go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, iam]
    defaults:
      run:
        working-directory: apps/backend/services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
