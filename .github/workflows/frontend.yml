name: frontend

on:
  pull_request:
    paths:
      - 'apps/frontend/**'
      - 'schemas/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm -F shell build
      - run: pnpm -F mfe-bot build
