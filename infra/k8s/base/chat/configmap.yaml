apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-config
data:
  PORT: "8009"
  ENVIRONMENT: "development"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "chat"
  REDIS_PORT: "6379"
  REDIS_DB: "2"
  # Admin owns LLM credentials. chat calls
  # `${ADMIN_SERVICE_URL}/internal/providers/...` with INTERNAL_API_TOKEN
  # (kept in the Secret).
  ADMIN_SERVICE_URL: "http://admin.default.svc.cluster.local:8001"
  LLM_TIMEOUT_SECONDS: "60"
