#   - ACCESS_TOKEN_SECRET     (must match iam service value)
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
type: Opaque
stringData:
  MYSQL_HOST: "REPLACE_ME"
  MYSQL_USER: "REPLACE_ME"
  MYSQL_PASSWORD: "REPLACE_ME"
  REDIS_HOST: "REPLACE_ME"
  ACCESS_TOKEN_SECRET: "REPLACE_ME"
