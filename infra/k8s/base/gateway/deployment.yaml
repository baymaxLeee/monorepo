apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels: { app: gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels: { app: gateway }
    spec:
      # Spread replicas across nodes so a single node failure does not take
      # down the entire edge layer.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: gateway }
      containers:
        - name: gateway
          image: ghcr.io/example/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000 }
          envFrom:
            - configMapRef: { name: gateway-config }
            - secretRef:    { name: gateway-secrets }
          resources:
            requests: { cpu: 100m,  memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          # Liveness only checks the HTTP server itself. Failure RESTARTS
          # the pod, so we never tie it to MySQL/Redis health.
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Readiness gates traffic via the Service. Failure removes the
          # pod from endpoints but keeps it running.
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          # Startup probe gives slow boots room (DB warmup) without making
          # liveness too lenient afterward.
          startupProbe:
            httpGet: { path: /livez, port: http }
            failureThreshold: 30
            periodSeconds: 2
          # Graceful shutdown window. Gateway should drain in-flight requests
          # within this period after receiving SIGTERM (see main.go).
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
      terminationGracePeriodSeconds: 30
