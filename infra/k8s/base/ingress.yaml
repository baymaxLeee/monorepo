# Ingress is the cluster's public HTTP entry point.
# - Cloudflare proxies api.your-domain.com → cluster LoadBalancer → this Ingress
# - Ingress terminates HTTPS using a TLS secret (cert-manager auto-issues via
#   Let's Encrypt; or upload Cloudflare Origin CA cert as a Secret)
# - Routes /api/* to the gateway service; everything else (/, /mfe-admin/,
#   /mfe-chat/) to the web service (nginx serving the SPA + MFE remotes
#   same-origin). Same-origin mounting keeps the app-registry entry a fixed
#   relative path across single-vps and k8s.
#
# Host is templated as a placeholder; overlays/prod patches it to the real
# domain. Cloudflare's "Full (strict)" SSL mode REQUIRES a real cert on the
# origin — using Cloudflare Origin CA is the simplest path here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # If cert-manager is installed, uncomment to auto-issue via Let's Encrypt:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.your-domain.com
      secretName: api-tls
  rules:
    - host: api.your-domain.com
      http:
        paths:
          # More-specific /api first so it out-ranks the catch-all /.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
