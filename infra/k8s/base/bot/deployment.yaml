apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot
  labels: { app: bot }
spec:
  replicas: 2
  selector:
    matchLabels: { app: bot }
  template:
    metadata:
      labels: { app: bot }
    spec:
      containers:
        - name: bot
          image: ghcr.io/example/bot:latest
          ports: [{ containerPort: 8001 }]
          env:
            - name: PORT
              value: "8001"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8001 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            periodSeconds: 5
