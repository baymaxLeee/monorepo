apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  labels: { app: clickhouse }
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels: { app: clickhouse }
  template:
    metadata:
      labels: { app: clickhouse }
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          env:
            - name: CLICKHOUSE_DB
              value: telemetry
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              value: ""
          ports:
            - containerPort: 8123
            - containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
            - name: dev-user
              mountPath: /etc/clickhouse-server/users.d/dev-user.xml
              subPath: dev-user.xml
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 2Gi }
          livenessProbe:
            httpGet: { path: /ping, port: 8123 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            periodSeconds: 5
      volumes:
        - name: init-sql
          configMap:
            name: clickhouse-init-sql
        - name: dev-user
          configMap:
            name: clickhouse-dev-user
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
