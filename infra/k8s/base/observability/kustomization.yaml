apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The init SQL / dev-user XML live under infra/observability/clickhouse/ so
# they can be shared with docker-compose. Kustomize by default refuses to
# read files outside its own root, so we opt-in via `load_restrictor`.
# Invoke with: kustomize build --load-restrictor=LoadRestrictionsNone
#              kubectl kustomize --load-restrictor=LoadRestrictionsNone
resources:
  - clickhouse-statefulset.yaml
  - clickhouse-service.yaml
configMapGenerator:
  - name: clickhouse-init-sql
    files:
      - ../../../observability/clickhouse/init.sql
  - name: clickhouse-dev-user
    files:
      - ../../../observability/clickhouse/dev-user.xml
