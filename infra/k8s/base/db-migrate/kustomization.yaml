apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# db-migrate Jobs are typically applied by CI per-deploy, NOT as part of the
# standing kustomize tree. This base/kustomization exists so overlays can
# reference it for one-shot bootstrapping. Day-to-day deploys patch and apply
# job.yaml directly from CI.
resources:
  - job.yaml
