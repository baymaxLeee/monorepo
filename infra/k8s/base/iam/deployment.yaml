apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam
  labels: { app: iam }
spec:
  replicas: 2
  selector:
    matchLabels: { app: iam }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels: { app: iam }
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: iam }
      containers:
        - name: iam
          image: ghcr.io/example/iam:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8002 }
          envFrom:
            - configMapRef: { name: iam-config }
            - secretRef:    { name: iam-secrets }
          resources:
            requests: { cpu: 100m,  memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /livez, port: http }
            failureThreshold: 30
            periodSeconds: 2
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
      terminationGracePeriodSeconds: 30
