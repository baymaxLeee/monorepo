apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monorepo-prod

# All standing prod resources. Images are pinned to a git-sha by CI before
# `kubectl apply` (see images: section).
resources:
  - namespace.yaml
  - ../../base/gateway
  - ../../base/iam
  - ../../base/admin
  - ../../base/telemetry
  - ../../base/observability
  - ../../base/ingress.yaml

# CI patches `newTag` to the deploying git-sha. Registry hostname here is a
# placeholder — replace with the actual 火山引擎 CR endpoint:
#   cr-cn-<region>.volces.com/<namespace>/<repo>:<sha>
images:
  - name: ghcr.io/example/gateway
    newName: REPLACE_ME_REGISTRY/monorepo/gateway
    newTag: latest
  - name: ghcr.io/example/iam
    newName: REPLACE_ME_REGISTRY/monorepo/iam
    newTag: latest
  - name: ghcr.io/example/admin
    newName: REPLACE_ME_REGISTRY/monorepo/admin
    newTag: latest
  - name: ghcr.io/example/telemetry
    newName: REPLACE_ME_REGISTRY/monorepo/telemetry
    newTag: latest

# Replicas and prod-specific config / secret overrides.
patches:
  - path: patches/gateway-config.yaml
    target: { kind: ConfigMap, name: gateway-config }
  - path: patches/iam-config.yaml
    target: { kind: ConfigMap, name: iam-config }
  - path: patches/admin-config.yaml
    target: { kind: ConfigMap, name: admin-config }
  - path: patches/telemetry-config.yaml
    target: { kind: ConfigMap, name: telemetry-config }
  - path: patches/ingress-host.yaml
    target: { kind: Ingress, name: api }
  - path: patches/replicas.yaml
