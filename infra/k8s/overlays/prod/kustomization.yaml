apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monorepo-prod

resources:
  - namespace.yaml
  - ../../base/gateway
  - ../../base/iam
  - ../../base/admin
  - ../../base/chat
  - ../../base/telemetry
  - ../../base/web
  - ../../base/ingress.yaml

# CI patches `newName` + `newTag` to the real registry + git-sha via
# `kustomize edit set image` (see .github/workflows/deploy-prod.yml).
# The defaults below intentionally point at registry.invalid — that's an
# RFC 2606 reserved TLD that NEVER resolves, so a forgotten override produces
# a loud ImagePullBackOff (instead of a silent InvalidImageName from an
# uppercase placeholder, or worse, accidentally pulling a real image).
#
# For 火山引擎 CR the production newName looks like:
#   cr-cn-<region>.volces.com/<namespace>/<repo>
images:
  - name: ghcr.io/example/gateway
    newName: registry.invalid/monorepo/gateway
    newTag: placeholder
  - name: ghcr.io/example/iam
    newName: registry.invalid/monorepo/iam
    newTag: placeholder
  - name: ghcr.io/example/admin
    newName: registry.invalid/monorepo/admin
    newTag: placeholder
  - name: ghcr.io/example/chat
    newName: registry.invalid/monorepo/chat
    newTag: placeholder
  - name: ghcr.io/example/telemetry
    newName: registry.invalid/monorepo/telemetry
    newTag: placeholder
  - name: ghcr.io/example/web
    newName: registry.invalid/monorepo/web
    newTag: placeholder

patches:
  - path: patches/gateway-config.yaml
    target: { kind: ConfigMap, name: gateway-config }
  - path: patches/iam-config.yaml
    target: { kind: ConfigMap, name: iam-config }
  - path: patches/admin-config.yaml
    target: { kind: ConfigMap, name: admin-config }
  - path: patches/chat-config.yaml
    target: { kind: ConfigMap, name: chat-config }
  - path: patches/telemetry-config.yaml
    target: { kind: ConfigMap, name: telemetry-config }
  - path: patches/ingress-host.yaml
    target: { kind: Ingress, name: api }
  - path: patches/replicas.yaml
