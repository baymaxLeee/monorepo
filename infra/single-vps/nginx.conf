# nginx config for the single-VPS deployment.
#
# Baked into the `web` image. Listens on :80 inside the container; the host
# maps PUBLIC_PORT (default 8080) → 80. Serves the SPA dist and proxies
# /api/* to the gateway service.

server {
    listen 80 default_server;
    server_name _;

    # Hide the nginx version in error pages / headers.
    server_tokens off;

    # nginx:alpine may not map .mjs to a JavaScript MIME type. Module workers
    # require a strict JS MIME type; otherwise pdf.js workers are rejected.
    types {
        application/json json;
        application/javascript js mjs;
        application/wasm wasm;
        font/woff2 woff2;
        image/jpeg jpg jpeg;
        image/png png;
        image/svg+xml svg;
        image/x-icon ico;
        text/css css;
        text/html html htm;
        text/plain txt;
        text/xml xml;
    }

    # ── compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── upstream API proxy ────────────────────────────────────────
    # All backend calls go through the gateway service. The gateway
    # routes /api/iam-server, /api/admin-server, /api/chat-server,
    # /api/telemetry-server internally.
    #
    # NOTE on SSE: /api/chat-server/conversations/<id>/messages streams
    # via Server-Sent Events. The settings below already handle that:
    #   - proxy_buffering off  → flush each chunk to the client immediately
    #   - http_version 1.1     → keep-alive needed for long-lived stream
    #   - proxy_read_timeout 30s is intentionally short; the chat service
    #     emits a heartbeat / final event well before that window.
    location /api/ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The browser sends the request as same-origin; we forward it as-is.
        proxy_set_header Origin            $http_origin;
        proxy_set_header Cookie            $http_cookie;

        # Long enough for slow downstream calls; small enough that hung
        # connections don't pile up.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering       off;
    }

    # Direct passthrough for liveness probes from monitoring tools.
    location = /livez   { proxy_pass http://gateway:8000/livez;   }
    location = /readyz  { proxy_pass http://gateway:8000/readyz;  }
    location = /healthz { proxy_pass http://gateway:8000/healthz; }

    # ── Module Federation remote (admin MFE) ──────────────────────
    # Same-origin under /mfe-admin/. The host bundle reads
    # `mfe_admin@/mfe-admin/mf-manifest.json` at runtime.
    location /mfe-admin/ {
        alias /usr/share/nginx/html/mfe-admin/;
        try_files $uri $uri/ /mfe-admin/index.html;
        location = /mfe-admin/mf-manifest.json {
            alias /usr/share/nginx/html/mfe-admin/mf-manifest.json;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        location = /mfe-admin/remoteEntry.js {
            alias /usr/share/nginx/html/mfe-admin/remoteEntry.js;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        # Bundle filenames include contenthash → safe to cache aggressively.
        location ~* \.(?:mjs|js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Module Federation remote (chat MFE) ───────────────────────
    # Same-origin under /mfe-chat/. The host bundle reads
    # `mfe_chat@/mfe-chat/mf-manifest.json` at runtime.
    location /mfe-chat/ {
        alias /usr/share/nginx/html/mfe-chat/;
        try_files $uri $uri/ /mfe-chat/index.html;
        location = /mfe-chat/mf-manifest.json {
            alias /usr/share/nginx/html/mfe-chat/mf-manifest.json;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        location = /mfe-chat/remoteEntry.js {
            alias /usr/share/nginx/html/mfe-chat/remoteEntry.js;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        location ~* \.(?:mjs|js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── SPA host (platform) ───────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA history fallback: unknown paths → index.html for client router.
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset files live alongside index.html — cache them hard.
    location ~* \.(?:mjs|js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must NOT be cached — it's the entry point and gets new
    # hashed asset references on every deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Block direct access to dotfiles like .env that might leak in.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
