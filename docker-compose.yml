services:
  mysql:
    image: mysql:8.4
    container_name: monorepo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
      MYSQL_DATABASE: admin
    ports: ["3306:3306"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: monorepo-redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: monorepo-clickhouse
    environment:
      CLICKHOUSE_DB: telemetry
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports: ["8123:8123"]
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/observability/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/observability/clickhouse/dev-user.xml:/etc/clickhouse-server/users.d/dev-user.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
  clickhouse_data:
